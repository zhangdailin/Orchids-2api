{{define "page-accounts"}}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="{{.AdminPath}}/css/main.css?v=20260328-3">
</head>

<body>
  {{template "sidebar.html" .}}

  <main class="main-content">
    <section class="header-section" id="accountsHeader">
      <h1 id="pageTitle">账号管理</h1>
      <p id="pageSubtitle">统一维护渠道账号、状态和可用性，快速完成导出、清理和批量操作。</p>
    </section>

    <section class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-info">
          <span class="label">总账号数</span>
          <span class="value" id="totalAccounts">0</span>
        </div>
        <div class="stat-icon total" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-info">
          <span class="label">状态正常</span>
          <span class="value metric-positive" id="enabledAccounts">0</span>
        </div>
        <div class="stat-icon normal" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-info">
          <span class="label">状态异常</span>
          <span class="value metric-negative" id="disabledAccounts">0</span>
        </div>
        <div class="stat-icon abnormal" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-info">
          <span class="label">已选中</span>
          <span class="value metric-accent" id="selectedCount">0</span>
        </div>
        <div class="stat-icon selected" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
      </div>
    </section>

    <div id="accountsTabContent">
      <div class="toolbar toolbar-compact">
        <div class="filter-tabs" id="platformFilters"></div>

        <div class="toolbar-actions toolbar-actions-spread">
          <div class="inline-actions">
            <button class="btn btn-outline" onclick="exportAccounts()">导出</button>
          </div>
          <div class="toolbar-divider"></div>
          <div class="inline-actions">
            <button class="btn btn-outline" id="batchDeleteBtn" disabled onclick="batchDeleteAccounts()">批量删除</button>
            <button class="btn btn-danger-outline" onclick="clearAbnormalAccounts()">清空异常</button>
          </div>
          <button class="btn btn-primary" onclick="openModal()">添加账号</button>
        </div>
      </div>

      <div class="content-card">
        <div id="accountsList">
          <div class="empty-state empty-state-panel">
            <span class="empty-state-mark">AC</span>
            <p>暂无账号数据</p>
          </div>
        </div>
      </div>

      <div class="pagination-shell">
        <div id="paginationInfo" class="pagination-info">共 0 条记录，第 1/1 页</div>
        <div class="inline-actions">
          <select class="form-input compact-select" onchange="updatePageSize(this.value)">
            <option value="20">20 条/页</option>
            <option value="50">50 条/页</option>
            <option value="100">100 条/页</option>
          </select>
          <div class="pagination-controls" id="paginationControls">
            <button class="btn btn-outline btn-page">首页</button>
            <button class="btn btn-outline btn-page">上一页</button>
            <button class="btn btn-primary btn-page btn-page-current">1</button>
            <button class="btn btn-outline btn-page">下一页</button>
            <button class="btn btn-outline btn-page">末页</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  {{template "key-modals.html"}}
  {{template "account-modal.html"}}

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="{{.AdminPath}}/js/common.js?v=20260605-2"></script>
  <script src="{{.AdminPath}}/js/accounts.js?v=20260605-1"></script>
</body>

</html>
{{end}}
