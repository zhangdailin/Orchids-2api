<!-- Account Modal -->
<div class="modal" id="accountModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">添加账号</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <form id="accountForm" onsubmit="saveAccount(event)">
      <input type="hidden" id="accountId" />
      <div class="form-group">
        <label class="form-label">账号类型</label>
        <select class="form-input" id="accountType">
          <option value="orchids">Orchids</option>
          <option value="warp">Warp</option>
          <option value="bolt">Bolt</option>
          <option value="puter">Puter</option>
          <option value="grok">Grok</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" id="tokenLabel">__session</label>
        <textarea class="form-input" id="clientCookie" rows="8" required placeholder="每行一个 __session"></textarea>
        <small id="tokenHint" style="color: var(--text-muted); font-size: 12px">Orchids 当前仅支持 __session。新增时每行一个；编辑时只使用第一行</small>
      </div>
      <div class="form-group" id="projectIdGroup" style="display:none;">
        <label class="form-label" for="projectId">Project ID</label>
        <input class="form-input" id="projectId" placeholder="sb1-..." />
        <small id="projectIdHint" style="color: var(--text-muted); font-size: 12px">Bolt 账号需要填写固定的 project_id。</small>
      </div>
      <div class="form-group">
        <label class="form-label">
          <label class="toggle">
            <input type="checkbox" id="enabled" checked />
            <span class="toggle-slider"></span>
          </label>
          &nbsp;&nbsp;启用账号
        </label>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px">
        保存
      </button>
    </form>
  </div>
</div>
