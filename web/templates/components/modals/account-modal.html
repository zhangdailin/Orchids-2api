<!-- Account Modal -->
<div class="modal" id="accountModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">添加账号</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <form id="accountForm" onsubmit="saveAccount(event)">
      <input type="hidden" id="accountId" />
      <div class="form-group">
        <label class="form-label">账号类型</label>
        <select class="form-input" id="accountType">
          <option value="orchids">Orchids</option>
          <option value="warp">Warp</option>
          <option value="puter">Puter</option>
          <option value="grok">Grok</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" id="tokenLabel">__session</label>
        <div class="account-token-actions" id="warpLocalImportActions" hidden>
          <button type="button" class="btn btn-secondary btn-sm" onclick="selectWarpUserFile()">上传 User JSON / token 并保存</button>
          <input type="file" id="warpUserFileInput" hidden />
        </div>
        <textarea class="form-input account-token-input" id="clientCookie" rows="8" wrap="off" spellcheck="false" required placeholder="每行一个 __session"></textarea>
        <small id="tokenHint" class="helper-text">Orchids 当前仅支持 __session。新增时每行一个；编辑时只使用第一行</small>
      </div>
      <div class="form-group">
        <label class="form-label">
          <label class="toggle">
            <input type="checkbox" id="enabled" checked />
            <span class="toggle-slider"></span>
          </label>
          &nbsp;&nbsp;启用账号
        </label>
      </div>
      <div class="account-import-status" id="accountImportStatus" hidden></div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px">
        保存
      </button>
    </form>
  </div>
</div>
