<div class="mobile-topbar">
  <button class="mobile-menu-btn" type="button" onclick="toggleSidebar(true)" aria-label="打开导航菜单">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <div class="mobile-topbar-brand">
    <div class="logo">O</div>
    <div>
      <div class="title">Orchids Console</div>
      <div class="sidebar-subtitle">Control center</div>
    </div>
  </div>
</div>
<div class="sidebar-overlay" onclick="toggleSidebar(false)"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">O</div>
    <div>
      <div class="title">Orchids</div>
      <div class="sidebar-subtitle">Admin Console</div>
    </div>
  </div>
  <ul class="sidebar-menu">
    <li class="sidebar-item">
      <a href="#" class="sidebar-link {{if eq .ActiveTab "accounts"}}active{{end}}" onclick="switchTab('accounts')">
        <span class="nav-glyph" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </span>
        <span>账号管理</span>
      </a>
    </li>
    <li class="sidebar-item">
      <a href="#" class="sidebar-link {{if eq .ActiveTab "keys"}}active{{end}}" onclick="switchTab('keys')">
        <span class="nav-glyph" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.51a2 2 0 0 1 1-1.72l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
        <span>配置管理</span>
      </a>
    </li>
    <li class="sidebar-item">
      <a href="#" class="sidebar-link {{if eq .ActiveTab "models"}}active{{end}}" onclick="switchTab('models')">
        <span class="nav-glyph" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7H14a3.5 3.5 0 0 1 0 7H6"/></svg>
        </span>
        <span>模型管理</span>
      </a>
    </li>
    <li class="sidebar-item">
      <a href="#" class="sidebar-link {{if eq .ActiveTab "grok-tools"}}active{{end}}" onclick="switchTab('grok-tools')">
        <span class="nav-glyph" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M10 20.5c.5-2.5 2-4.5 4.5-6"/><path d="M14 3.5c3 1 5.5 3.5 6.5 6.5"/><path d="M4 14c1-3 3.5-5.5 6.5-6.5"/><path d="M6 20h12"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
        <span>Grok 工具</span>
      </a>
    </li>
    <li class="sidebar-item">
      <a href="#" class="sidebar-link {{if eq .ActiveTab "tutorial"}}active{{end}}" onclick="switchTab('tutorial')">
        <span class="nav-glyph" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5Z"/></svg>
        </span>
        <span>使用教程</span>
      </a>
    </li>
  </ul>
  <div class="sidebar-footer">
    <div class="sidebar-footer-stats">
      <div class="footer-stat-item">
        <span class="footer-stat-label">总账号</span>
        <span class="footer-stat-value" id="footerTotal">{{.Stats.TotalAccounts}}</span>
      </div>
      <div class="footer-stat-item">
        <span class="footer-stat-label">正常</span>
        <span class="footer-stat-value normal" id="footerNormal">{{.Stats.NormalAccounts}}</span>
      </div>
      <div class="footer-stat-item">
        <span class="footer-stat-label">异常</span>
        <span class="footer-stat-value abnormal" id="footerAbnormal">{{.Stats.AbnormalAccounts}}</span>
      </div>
    </div>
    <button class="btn btn-outline sidebar-logout" onclick="logout()">
      <span class="nav-glyph nav-glyph-small">EX</span>
      <span>退出登录</span>
    </button>
  </div>
</aside>
